<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — backITup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-lg rounded-lg w-full max-w-sm p-8">
    <h1 class="text-4xl font-bold text-blue-600 text-center mb-2">backITup</h1>
    <p class="text-center text-gray-500 text-sm mb-6">Sign in to your dashboard</p>

    {% if error %}
    <div class="mb-4 px-4 py-3 rounded bg-red-100 text-red-700 text-sm text-center">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('routes.login') }}" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required autofocus
               class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
               class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded transition">
        Login
      </button>
    </form>
  </div>
</body>
</html>
